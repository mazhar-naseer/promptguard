<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PromptGuard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  {% if user %}
  <div class="shell">
    <aside class="rail">
      <div class="rail-brand">
        <span class="brand-mark">▣</span>
        <span class="brand-text">PromptGuard</span>
      </div>
      <nav class="rail-nav">
        <a href="/" class="{{ 'active' if request.url.path == '/' else '' }}">
          <span class="nav-ico">⌁</span> Analyze
        </a>
        <a href="/dashboard" class="{{ 'active' if request.url.path == '/dashboard' else '' }}">
          <span class="nav-ico">▤</span> History
        </a>
        {% if user.role == 'admin' %}
        <div class="rail-divider">Admin</div>
        <a href="/admin/rules" class="{{ 'active' if request.url.path == '/admin/rules' else '' }}">
          <span class="nav-ico">◈</span> Rules
        </a>
        <a href="/admin/audit" class="{{ 'active' if request.url.path == '/admin/audit' else '' }}">
          <span class="nav-ico">▥</span> Audit Log
        </a>
        {% endif %}
      </nav>
      <div class="rail-footer">
        <div class="rail-user">
          <span class="user-dot user-dot-{{ user.role }}"></span>
          <div>
            <div class="user-name">{{ user.username }}</div>
            <div class="user-role">{{ user.role }}</div>
          </div>
        </div>
        <form action="/logout" method="post">
          <button class="btn-ghost" type="submit">Sign out</button>
        </form>
      </div>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% else %}
    {% block bare_content %}{% endblock %}
  {% endif %}
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
