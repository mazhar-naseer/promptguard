{% extends "base.html" %}
{% block title %}Sign in · PromptGuard{% endblock %}
{% block bare_content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand"><span class="brand-mark">▣</span> PromptGuard</div>
    <div class="auth-sub">Prompt injection & jailbreak detection console</div>
    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="field-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary" style="width:100%; margin-top:6px;">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
