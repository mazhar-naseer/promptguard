services:
  promptguard:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - promptguard_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  promptguard_data:
